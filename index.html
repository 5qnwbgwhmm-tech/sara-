<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Little Something for You ✨</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            color: white;
            text-align: center;
            /* Background image setup */
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                        url('https://github.com/5qnwbgwhmm-tech/sara-/commit/8bf9bb4ef0afa0239e9d961f7307defa5cb8d450');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .overlay-card {
            z-index: 10;
            padding: 30px;
            width: 90%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            transition: all 0.5s ease;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        p.sub-text {
            font-size: 1.1rem;
            margin-bottom: 25px;
            opacity: 0.9;
        }

        #flower {
            font-size: 80px;
            cursor: pointer;
            display: inline-block;
            transition: transform 0.3s ease;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.4));
        }

        #flower:hover {
            transform: scale(1.15) rotate(10deg);
        }

        .reveal-btn {
            background: white;
            color: #d63384;
            border: none;
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .reveal-btn:hover {
            background: #ffe0ef;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .hidden-msg {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 18px;
            color: #333;
            animation: slideUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .sparkle {
            position: fixed;
            top: -20px;
            pointer-events: none;
            animation: fall linear forwards;
            z-index: 1;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="overlay-card">
    <div id="flower">🌸</div>
    <h1>Hi Sara! ✨</h1>
    <p class="sub-text">I know we just met today, but I wanted to send you something a little more creative than a text message.</p>
    
    <button class="reveal-btn" id="clickBtn">Click to open</button>

    <div id="hiddenMsg" class="hidden-msg">
        <h2 style="margin: 0 0 10px 0; color: #d63384;">You really made my day!</h2>
        <p style="margin: 0; line-height: 1.5; color: #555;">Meeting you was definitely the highlight of my 24 hours. Looking forward to talking more. 😊</p>
    </div>
</div>

<script>
    const btn = document.getElementById('clickBtn');
    const msg = document.getElementById('hiddenMsg');
    const flower = document.getElementById('flower');

    function startSurprise() {
        if (msg.style.display !== 'block') {
            msg.style.display = 'block';
            btn.style.display = 'none';
            // Burst of sparkles
            for(let i=0; i<15; i++) {
                setTimeout(createSparkle, i * 100);
            }
            // Continuous sparkles
            setInterval(createSparkle, 200);
        }
    }

    btn.addEventListener('click', startSurprise);
    flower.addEventListener('click', startSurprise);

    function createSparkle() {
        const sparkle = document.createElement('div');
        sparkle.classList.add('sparkle');
        const icons = ['✨', '🌸', '💫', '💖', '⭐'];
        sparkle.innerText = icons[Math.floor(Math.random() * icons.length)];
        sparkle.style.left = Math.random() * 100 + 'vw';
        sparkle.style.fontSize = (Math.random() * 15 + 15) + 'px';
        sparkle.style.animationDuration = (Math.random() * 2 + 3) + 's';
        document.body.appendChild(sparkle);
        
        setTimeout(() => sparkle.remove(), 5000);
    }
</script>

</body>
</html>
